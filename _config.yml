about_content: |
  **Computer Vision / AI 엔지니어**로서 **10년 이상**의 산업 현장 경험을 보유하고 있습니다.

  제조 공정 품질검사, 자원순환 선별 로봇, 골프 스윙 분석, Edge Device 최적화 등
  다양한 산업 도메인에서 비전 솔루션을 **설계 / 개발 / 배포**해왔습니다.

  **핵심 역량 3가지:**

  - **Vision SW** — C++/C# 기반 2D/3D 비전 알고리즘 설계 및 Windows 데스크톱 SW 개발 (OpenCV, Halcon, WPF, Qt)
  - **AI** — 이미지 AI (Object Detection, Segmentation, Pose Estimation) 모델 학습/최적화 및 LLM/RAG 기반 Agent 개발
  - **풀스택 웹서비스** — React 프론트엔드 + 백엔드 + AWS/Cloudflare 인프라 구성까지 1인 풀스택 개발 가능

