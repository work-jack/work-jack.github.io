  - title: 연구 실적
    layout: list
    content:

      - layout: left
        title: 컴퓨터 비전 및 패턴인식 연구실
        caption: 연구 분야 — 영상 개선, 패턴 인식, 머신 비전
        description: |
          **논문**

          ---

          **MSCNN과 cGAN을 이용한 실내안개제거** *(학술대회, 2018.11)*

          안개가 있는 상황에서 촬영된 영상에서 안개를 제거하는 방법 연구.
          cGAN을 사용하여 사실적인 결과를 추구하였고, 생성모델에 MSCNN을 사용하여
          더 나은 특징 추출 결과를 달성.

          ![안개제거 연구](assets/images/research/dehazing.png)

          ---

          **CNN과 가이드 영상을 이용한 세포핵 검출** *(저널, 2018.09)*

          다양한 검사 장비로 촬영된 의료영상에서 세포핵 영역을 검출하는 방법 연구.
          전통적인 영상처리 기법과 MSCNN을 사용하였고, curriculum 학습방법을 적용.

          ![세포핵 검출](assets/images/research/cell-detection.png)

          ---

          **Fast SMDs Segmentation on PCB using CNN** *(학술대회, 2018.01)*

          PCB 영상에서 보드와 칩들을 각각 분할하는 방법 연구.
          기존의 영상분할 네트워크에서 PCB 영상의 특성에 맞게 네트워크를 수정하였고
          실시간 연산을 위해 최적화.

          ![PCB Segmentation](assets/images/research/pcb-segmentation.png)

          ---

          **산학 연계 프로젝트**

          ---

          **영상기반 검사장비의 성능 향상을 위한 연구** *(2017.03 — 2017.11, 9개월)*

          역할: 데이터 전처리, 네트워크 설계 및 실험 | 수행인원: 2명

          PCB 검사 장비에서 촬영된 영상에서 딥러닝을 이용하여 불량을 검출하는 방법 연구.
          PCB 영상을 Semantic Segmentation하여 칩날림 불량을 검출.
          실시간 수행을 고려한 네트워크 최적화 연구.

          ---

          **심층 인공신경망 기반 영상 검사 장비의 성능 향상을 위한 연구** *(2017.12 — 2018.11, 12개월)*

          역할: 데이터 전처리, 네트워크 설계 및 실험 | 수행인원: 2명

          PCB 위 다양한 칩들의 종류를 딥러닝을 이용하여 분류하는 방법 연구.
          Residual 블록과 Inception 블록을 사용하는 방법 및
          딥러닝 네트워크와 전통적 영상처리 기법을 융합하는 방법 연구.

