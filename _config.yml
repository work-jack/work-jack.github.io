  - title: 경력 사항
    layout: list
    content:

      # ── A사: 자원순환 선별로봇 ──
      - layout: left
        title: A사 — 자원순환 선별로봇 개발
        sub_title: Vision 솔루션 엔지니어
        caption: 2023.10 — 2025.06
        description: |
          자원순환 선별로봇 개발 및 로봇자원 순환센터 솔루션 개발

          ---

          **1. Vision 솔루션 구조개선** | C++, OpenCV

          - 기존 CLI 기반 Vision 코드를 Native C++ 프로젝트로 분리 (보안 강화, 유지보수 편의성 개선)
          - Vision 코드 구조 리팩토링 (클래스화, 싱글톤, 팩토리 패턴 적용, Thread 적용)
          - 산재되어 있던 Config 파일 통합 (사용자 편의성 개선)
          - AI 모델 암호화 적용 (ONNX → 암호화된 .enc 변환)

          ![Vision 솔루션 구조개선](assets/images/company-a/vision-restructure.png)

          ---

          **2. Calibration 소프트웨어 개발** | C#, OpenCV

          - 광학계 세팅을 위한 Calibration 프로그램 개발
            - Histogram 매칭 기반 WB Calibration
            - Edge 평가 기반 Focus Calibration
            - Histogram 평가 기반 Contrast Calibration (RS485 기반 조명컨트롤러)
            - Pixel Size 측정 기능
            - 카메라 정렬용 뷰어 기능

          ![Calibration 소프트웨어](assets/images/company-a/calibration-sw.png)

          ---

          **3. RGB & Spectral 카메라 융합 솔루션 개발** | C++, OpenCV *(Tips 우수과제)*

          - 기존 솔루션 기반 Spectral 데이터 처리방법 설계 (Thread, Process 등 고려)
          - Processing time 고려 전처리 및 알고리즘 개발 (raw, reflectance, SAM, PCA, SVM 등)
          - Socket 통신 코드 개발

          ![Spectral 카메라 융합](assets/images/company-a/spectral-fusion.png)

          ---

          **4. Setup 및 이슈대응** | C++, OpenCV

          - 카메라 세팅 (설치, 캘리브레이션), Vision 코드 Config/모델/파라미터 세팅
          - 객체 개수 변화 시 Processing time 증가 현상 개선

          ---

          **5. 장비 모니터링 시스템 개발** | Python, OpenCV, Qt

          - 카메라 사양 설계 및 발주
          - 기존 모니터링 카메라 대체 적용 방법 설계 및 가이드 작성
          - 모니터링 카메라 활용 방안 설계 및 개발
            - 피킹률 체크, 토출구 상태 체크, NVR, Anomaly Detection

          ![모니터링 시스템](assets/images/company-a/monitoring-system.png)

          ---

          **6. AI 관련 프로젝트**

          - 라벨링 툴 개선: 기존 Detection 라벨링 툴 → Segmentation 툴로 개선 (SAM 적용)
          - 모델 학습 속도 개선: 데이터 로딩 속도 개선을 위한 LMDB 적용
          - C++ 프로젝트에 모델 포팅 (TensorRT, CUDA 적용)
          - 딥러닝 서버 사양 설계 및 발주

          ---

          **7. 기타 업무**

          - 정부지원과제 계획서 작성 및 시험성적서 대응

      # ── B사: 골프 스윙 분석 ──
      - layout: left
        title: B사 — 골프 스윙 분석 솔루션 / Edge 디바이스 최적화
        sub_title: 컴퓨터 비전 엔지니어
        caption: 2020.08 — 2022.12 (2년 5개월)
        description: |
          골프 스윙 분석 솔루션, 골프장 레이아웃 분석 솔루션, 딥러닝 모델 최적화 및 Edge 디바이스용 모델 개발

          ---

          **1. 골프 스윙 분석** | Python, PyTorch, Windows/Linux

          - 골프 자세분석을 위한 Object Detection 모델 개선
            - 골프공 검출을 위한 Tiny Object 검출 방법 연구
            - 입력 데이터의 소량변화(픽셀이동 및 회전 등)에 강건한 추론 결과를 위한 연구
          - 2D Pose Estimation 모델 개선
            - Backbone model 성능 향상을 위한 연구 (Attention, Activation 실험)
            - Estimation 결과(feature map) 후처리 방법 개선 연구 (argmax → modeling)
          - 골프 시퀀스 키프레임 추출 및 골프 자세 분석 알고리즘 개발
            - 스윙 이미지 변화량(광량흐름, 차영상 등) 데이터 기반 통계분석을 통한 키프레임 추출
            - 2D Pose Estimation 결과를 이용한 골프 자세 분석 정보 추출
          - 배포
            - 모델 및 가중치 보호를 위한 암호화 방법 개발
            - Unity(C#)과 Python Inter-Communicator 개발
            - 라이센스 계약을 위한 GCP 기반 서버리스 SW 개발

          ![골프 스윙 분석](assets/images/company-b/golf-swing-analysis.png)

          ---

          **2. 골프장 레이아웃 분석** | Python, OpenCV, Google Map API

          - 골프장 지도 이미지를 이용한 구성 요소 통계분석 (Google Map API 크롤링)
          - 전통적 영상처리 알고리즘을 이용한 홀 구성 요소 분할 및 평가

          ![골프장 레이아웃 분석](assets/images/company-b/golf-layout.png)

          ---

          **3. RCWS용 모델 개발 및 Nvidia Jetson(SOM) 최적화** | Python, C++, DeepStream, Linux

          - Edge Device용 동영상 처리 프로세스 개발
            - DeepStream Pipeline 설계
            - Nvinfer 플러그인 수정 (ROI 연산)
            - 리눅스 시스템 스케줄링, 시스템 경량화 (X11 → Wayland(Weston))
          - Object Detection 모델 학습
            - 데이터 수집/정제, 레이블링
            - TAO(Train, Adapt, Optimize) 모델 학습 및 TensorRT 변환

